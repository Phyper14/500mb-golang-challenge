name: Release image

# Builds and publishes the native arm64 (+ amd64) image to GHCR whenever a
# semver tag is pushed. The challenge requires a public image with a
# native arm64 manifest (no QEMU emulation at runtime) — buildx with QEMU
# at *build* time (cross-compiling from an amd64 runner) satisfies that:
# the resulting manifest contains a real arm64 layer set, not an emulated
# amd64 image tagged as arm64.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/500mb-golang-challenge:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/500mb-golang-challenge:latest
