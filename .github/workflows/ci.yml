name: CI

on:
  push:
    branches: [main, implementation]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false

      - name: go test (race)
        run: go test -race -coverprofile=coverage.out ./...

      - name: coverage summary
        run: go tool cover -func=coverage.out | tail -1

  build:
    name: docker build (multi-arch)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: build image (no push, PR/CI sanity check)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false

  compose-validate:
    name: compose security gate (local dry-run)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: docker compose config
        run: docker compose config > /tmp/resolved.yml

      - name: install PyYAML
        run: pip install --user pyyaml

      - name: fetch challenge validator scripts
        run: |
          curl -fsSL -o /tmp/harden_compose.py \
            https://raw.githubusercontent.com/The-500MB-Club/the_500mb_club_challenge/master/scripts/harden_compose.py
          curl -fsSL -o /tmp/validate_compose.py \
            https://raw.githubusercontent.com/The-500MB-Club/the_500mb_club_challenge/master/scripts/validate_compose.py

      - name: harden + validate compose
        run: |
          python3 /tmp/harden_compose.py --in /tmp/resolved.yml --out /tmp/hardened.yml \
            --injected-out /tmp/injected.json
          python3 /tmp/validate_compose.py --compose /tmp/hardened.yml --raw docker-compose.yml \
            --injected /tmp/injected.json --project-dir "$GITHUB_WORKSPACE"
