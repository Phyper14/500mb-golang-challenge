# The 500MB Club Challenge — reference implementation (Go + Redis + nginx).
#
# Aggregate budget check (docs/pt-br/scoring.md "gate"):
#   CPU:    0.5*3 (api) + 0.3 (lb) + 0.2 (redis) = 2.0  <= 2.0 cap
#   Memory: 80m*3 (api) + 40m (lb) + 100m (redis) = 380 MiB <= 500 MiB cap
# That leaves ~120 MiB of headroom under the hard cap for RSS spikes
# during capacity/spike/endurance scenarios.
#
# Storage: redis (allowlisted, in-memory K/V — lowest overhead of the
# four accepted engines for this write-heavy workload).

services:
  api-1: &api
    image: ghcr.io/Phyper14/500mb-golang-challenge:latest
    environment:
      LISTEN_ADDR: ":8000"
      INSTANCE_ID: "api-1"
      REDIS_ADDR: "redis:6379"
      REDIS_POOL_SIZE: "8"
      MAX_POINTS_PER_DEVICE: "5000"
      SHUTDOWN_TIMEOUT: "10s"
    user: "65532:65532"
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - /tmp
    mem_limit: 80m
    cpus: 0.5
    networks: [backend]
    depends_on: [redis]

  api-2:
    <<: *api
    environment:
      LISTEN_ADDR: ":8000"
      INSTANCE_ID: "api-2"
      REDIS_ADDR: "redis:6379"
      REDIS_POOL_SIZE: "8"
      MAX_POINTS_PER_DEVICE: "5000"
      SHUTDOWN_TIMEOUT: "10s"

  api-3:
    <<: *api
    environment:
      LISTEN_ADDR: ":8000"
      INSTANCE_ID: "api-3"
      REDIS_ADDR: "redis:6379"
      REDIS_POOL_SIZE: "8"
      MAX_POINTS_PER_DEVICE: "5000"
      SHUTDOWN_TIMEOUT: "10s"

  lb:
    image: nginx:1.27-alpine
    ports: ["8080:80"]
    read_only: true
    security_opt: [no-new-privileges:true]
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    mem_limit: 40m
    cpus: 0.3
    networks: [backend, edge]
    depends_on: [api-1, api-2, api-3]

  redis:
    image: redis:7-alpine
    command: >-
      redis-server
      --save ""
      --appendonly no
      --maxmemory 80mb
      --maxmemory-policy allkeys-lru
    read_only: true
    security_opt: [no-new-privileges:true]
    tmpfs:
      - /data
    mem_limit: 100m
    cpus: 0.2
    networks: [backend]

networks:
  backend:
    internal: true
  edge: {}
