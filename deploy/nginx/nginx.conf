# The 500MB Club — load balancer.
#
# Strict round-robin: nginx's upstream module defaults to round-robin
# unless a different balancing directive (least_conn, ip_hash, etc.) is
# declared. We deliberately omit any of those so the challenge's
# fairness rule ("round-robin estrito, sem heurísticas adaptativas") is
# satisfied by construction, not by a comment.
worker_processes 1;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    access_log off;
    error_log  /dev/stderr warn;

    sendfile        on;
    tcp_nopush       on;
    tcp_nodelay      on;
    keepalive_timeout 65;
    keepalive_requests 10000;

    # Upstream connection reuse toward the API replicas: avoids a fresh
    # TCP handshake per proxied request under sustained/capacity load.
    upstream api_backend {
        server api-1:8000 max_fails=3 fail_timeout=10s;
        server api-2:8000 max_fails=3 fail_timeout=10s;
        server api-3:8000 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://api_backend;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 2s;
            proxy_read_timeout    10s;
            proxy_send_timeout    10s;
        }
    }
}
